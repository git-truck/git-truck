name: "Release"

on:
  push:
    branches:
      - "main"

permissions:
  id-token: write
  contents: read

jobs:
  bump-version:
    name: "Build, bump and release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v6"
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.TOKEN }}
      - name: "cat package.json"
        run: cat ./package.json
      - name: Update version in package.json
        uses: "phips28/gh-action-bump-version@v10.1.1"
        with:
          patch-wording: "Fix,fix,Patch,patch"
          minor-wording: "Add,Feat,feat,NewVersion"
          major-wording: "BREAKING CHANGE,MAJOR VERSION"
          commit-message: "Bump version to {{version}} [skip ci]"
          tag-prefix: "v"
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: "Setup Node.js"
        uses: "actions/setup-node@v4"
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          always-auth: true
      - name: "Get npm provenance id_token"
        id: npm_provenance_token
        uses: actions/github-script@v7
        with:
          script: |
            const idToken = await core.getIDToken("npmjs.com");
            core.setOutput("token", idToken);
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm install --package-lock-only --ignore-scripts
      - run: git add package-lock.json
      - run: git config user.email "version-bot@example.com"
      - run: git config user.name "Version Bot"
      - run: git commit --amend --no-edit
      - run: git push --tags

      - run: npm ci
      - run: npm run test:unit
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE_TOKEN: ${{ steps.npm_provenance_token.outputs.token }}
