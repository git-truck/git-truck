# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of bun

name: Check (bun)

on:
  workflow_dispatch:

  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-bun:
    name: Check (bun) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        bun-version: ["1.3.9", latest]
        os: [ubuntu-latest, windows-latest, macos-latest]
        # See Bun releases at https://github.com/oven-sh/bun/releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: "0"

      - name: Setup Bun and install dependencies
        uses: ./.github/actions/setup-bun-install
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Run tests
        run: bun --bun test src

      - name: Build application
        run: bun --bun run build

      - name: Run typecheck
        run: bun --bun run typecheck

      - name: Check linting
        run: bun --bun run lint

      - name: Check formatting
        run: bun --bun run format:check

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v2
